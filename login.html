<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — RouteBook</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-sm">
  <!-- Logo -->
  <div class="text-center mb-8">
    <img src="AlawalTransit Logo.png" alt="RouteBook" class="w-16 h-16 rounded-full object-cover mx-auto mb-4 shadow-lg" style="width:4rem;height:4rem;border-radius:9999px;object-fit:cover;display:block;margin-left:auto;margin-right:auto">
    <h1 class="text-2xl font-bold text-white">RouteBook</h1>
    <p class="text-slate-400 text-sm mt-1">Sign in to your account</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-2xl p-8">
    <div id="error-box" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>
    <div id="info-box" class="hidden mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-blue-700 text-sm"></div>

    <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email or Username</label>
        <input id="email" type="text" required autocomplete="username"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
          placeholder="you@example.com or username">
      </div>
      <div>
        <div class="flex justify-between items-center mb-1">
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <button type="button" onclick="showForgot()" class="text-xs text-amber-600 hover:underline">Forgot password?</button>
        </div>
        <input id="password" type="password" required autocomplete="current-password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
          placeholder="••••••••">
      </div>
      <button type="submit" id="submit-btn"
        class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
        Sign In
      </button>
    </form>

    <!-- Forgot password form (hidden by default) -->
    <form id="forgot-form" onsubmit="handleForgot(event)" class="hidden space-y-4">
      <p class="text-sm text-gray-600">Enter your email and we'll send a reset link.</p>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input id="reset-email" type="email" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400"
          placeholder="you@example.com">
      </div>
      <div class="flex gap-2">
        <button type="button" onclick="showLogin()" class="flex-1 border border-gray-300 text-gray-700 font-medium py-2.5 rounded-lg text-sm">Cancel</button>
        <button type="submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2.5 rounded-lg text-sm">Send Link</button>
      </div>
    </form>

    <!-- Reset password form (shown after clicking email link) -->
    <form id="reset-form" onsubmit="handleReset(event)" class="hidden space-y-4">
      <p class="text-sm text-gray-600 font-medium">Set your new password</p>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
        <input id="new-password" type="password" required minlength="6"
          class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400"
          placeholder="At least 6 characters">
      </div>
      <button type="submit" id="reset-btn"
        class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
        Update Password
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-5">
      Don't have an account?
      <a href="/signup.html" class="text-amber-600 font-medium hover:underline">Create one</a>
    </p>
  </div>
</div>

<script>
const API = '/.netlify/functions';
let _sb = null;

async function init() {
  const cfg = await fetch(`${API}/config`).then(r => r.json()).catch(() => ({}));
  if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
    showError('Configuration error. Contact administrator.');
    return;
  }
  _sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  // Listen for PASSWORD_RECOVERY before checking existing session
  _sb.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      showResetForm();
    }
  });

  // Already logged in → go to app (but not if this is a recovery session)
  const { data: { session } } = await _sb.auth.getSession();
  if (session && session.user?.recovery_sent_at === undefined) {
    // Check URL hash — if type=recovery is present, don't redirect
    const hash = window.location.hash;
    if (!hash.includes('type=recovery')) {
      window.location.href = '/index.html';
    }
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Signing in…';
  btn.disabled = true;
  clearMessages();

  let email      = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  // Allow plain usernames — append fixed domain used by Create Account
  if (!email.includes('@')) email = email + '@routebook.internal';

  const { error } = await _sb.auth.signInWithPassword({ email, password });
  if (error) {
    showError(error.message);
    btn.textContent = 'Sign In';
    btn.disabled = false;
    return;
  }
  window.location.href = '/index.html';
}

async function handleForgot(e) {
  e.preventDefault();
  clearMessages();
  const email = document.getElementById('reset-email').value.trim();
  const siteUrl = window.location.origin;
  const { error } = await _sb.auth.resetPasswordForEmail(email, {
    redirectTo: `${siteUrl}/login.html`,
  });
  if (error) { showError(error.message); return; }
  showInfo('Reset link sent! Check your inbox.');
  showLogin();
}

function showResetForm() {
  clearMessages();
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('forgot-form').classList.add('hidden');
  document.getElementById('reset-form').classList.remove('hidden');
}

async function handleReset(e) {
  e.preventDefault();
  clearMessages();
  const btn = document.getElementById('reset-btn');
  btn.textContent = 'Updating…';
  btn.disabled = true;
  const newPassword = document.getElementById('new-password').value;
  const { error } = await _sb.auth.updateUser({ password: newPassword });
  if (error) {
    showError(error.message);
    btn.textContent = 'Update Password';
    btn.disabled = false;
    return;
  }
  showInfo('Password updated! Redirecting…');
  setTimeout(() => { window.location.href = '/index.html'; }, 1500);
}

function showForgot() {
  clearMessages();
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('forgot-form').classList.remove('hidden');
}
function showLogin() {
  document.getElementById('forgot-form').classList.add('hidden');
  document.getElementById('login-form').classList.remove('hidden');
}
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function showInfo(msg) {
  const el = document.getElementById('info-box');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function clearMessages() {
  document.getElementById('error-box').classList.add('hidden');
  document.getElementById('info-box').classList.add('hidden');
}

init();
</script>
</body>
</html>
