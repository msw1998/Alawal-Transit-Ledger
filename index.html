/* Prevent iOS input zoom */
input, select, textarea { font-size: 16px !important; }
/* Remove number input spinners and block scroll-to-change */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; appearance: textfield; }
input[type=number] { cursor: text; }
@media (min-width: 640px) { input, select, textarea { font-size: 14px !important; } }
@media print {
  .no-print { display: none !important; }
  body { background: white; }
}
/* Urdu / RTL mode */

/* Loading overlay */

}

@keyframes spin { to { transform: rotate(360deg); } }
#app-loader .spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(245,158,11,0.2);
  border-top-color: #f59e0b;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 0.3; transform: scale(0.8); }
  50%      { opacity: 1;   transform: scale(1.1); }
}
</style>

<script>
// ─── AUTH STATE ─────────────────────────────────────────────
let _sb          = null;   // Supabase JS client
let _jwtToken    = null;   // Current access token
let currentUser  = null;   // Supabase user object
let currentRole  = null;   // 'admin' | 'editor'
let currentOrg   = null;   // { id, name, ... }
let currentLang  = 'en';  // 'en' | 'ur'
let activeOrgId  = null;   // currently selected org
let allOrgs      = [];     // all orgs this user belongs to

// ─── DATA LAYER ─────────────────────────────────────────────
const cacheKey  = () => `alawal_cache_${activeOrgId || 'default'}`;
const API = '/.netlify/functions';
let appData = { entries: [], drivers: ['Nazir', 'Sheer Haider'] };

// Synchronous read — always returns in-memory state
function load() { return appData; }

// Persist to localStorage cache (keyed per org)
function cache() { try { localStorage.setItem(cacheKey(), JSON.stringify(appData)); } catch {} }

// Sync status indicator
function setSyncStatus(s) {
  const clsMap = { syncing:'text-slate-400', ok:'text-green-400', offline:'text-amber-400', error:'text-red-400' };
  const keyMap = { syncing:'sync.syncing', ok:'sync.ok', offline:'sync.offline', error:'sync.error' };
  const text = t(keyMap[s] || 'sync.ok');
  const cls  = clsMap[s] || clsMap.ok;
  document.querySelectorAll('.sync-status').forEach(el => {
    el.textContent = text;
    el.className = `sync-status text-xs font-medium transition-all min-w-16 text-right ${cls}`;
    if (s === 'ok') setTimeout(() => { el.textContent = ''; }, 2500);
  });
}

// API helper — always attaches JWT + active org so backend can verify identity + org
async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (_jwtToken)   headers['Authorization'] = `Bearer ${_jwtToken}`;
  if (activeOrgId) headers['X-Org-Id']      = activeOrgId;
  const r = await fetch(`${API}/${path}`, {
    method: opts.method || 'GET',
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ─── AUTH ────────────────────────────────────────────────────
async function initAuth() {
  // Fetch public Supabase config from server
  const cfg = await fetch(`${API}/config`).then(r => r.json()).catch(() => ({}));
  if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) {
    document.body.innerHTML = '<div class="min-h-screen flex items-center justify-center bg-slate-900"><div class="text-center text-white"><div class="text-xl font-bold mb-2">Configuration Error</div><div class="text-slate-400 text-sm">SUPABASE_ANON_KEY is not set. Check your .env file.</div></div></div>';
    return false;
  }

  _sb = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

  const { data: { session } } = await _sb.auth.getSession();
  if (!session) {
    window.location.href = '/login.html';
    return false;  // loader stays until navigation completes
  }

  _jwtToken   = session.access_token;
  currentUser = session.user;

  // Restore previously selected org for this user (before the profile fetch so X-Org-Id is sent)
  activeOrgId = localStorage.getItem(`activeOrg_${currentUser.id}`) || null;

  // Auto-refresh token
  _sb.auth.onAuthStateChange((event, s) => {
    if (event === 'SIGNED_OUT') { window.location.href = '/login.html'; return; }
    if (s) { _jwtToken = s.access_token; currentUser = s.user; }
  });

  // Fetch org + role
  const profile = await apiFetch('org-auth?action=profile').catch(() => null);
  if (!profile || profile.needsOrg) {
    // Only send to signup if they arrived directly (not referred from inside the app).
    // Invited users with a broken membership would loop otherwise.
    const ref = document.referrer;
    const fromSignup = ref.includes('/signup') || ref === '';
    if (fromSignup) {
      window.location.href = '/signup.html';
    } else {
      document.body.innerHTML = '<div class="min-h-screen flex items-center justify-center bg-slate-900"><div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center"><div class="text-4xl mb-4">⚠️</div><div class="font-bold text-gray-800 mb-2">No organization found</div><div class="text-gray-500 text-sm mb-6">Your account is not connected to any business. Please contact the person who invited you.</div><a href="/login.html" class="text-amber-600 text-sm font-medium hover:underline">← Back to login</a></div></div>';
    }
    return false;
  }

  currentOrg  = profile.org;
  currentRole = profile.role;
  activeOrgId = profile.org.id;
  allOrgs     = profile.allOrgs || [{ id: profile.org.id, name: profile.org.name, role: profile.role }];
  localStorage.setItem(`activeOrg_${currentUser.id}`, activeOrgId);

  applyRoleUI(profile.isSuperAdmin);
  return true;
}

function applyRoleUI(isSuperAdmin) {
  // Business name
  document.querySelectorAll('.org-name-el').forEach(el => {
    el.textContent = currentOrg?.name || 'My Business';
  });

  // User avatar initials
  const initials = (currentUser?.email || '?')[0].toUpperCase();
  document.getElementById('user-avatar').textContent        = initials;
  document.getElementById('user-avatar-mobile').textContent = initials;

  // User email in dropdown
  const email = currentUser?.email || '';
  document.getElementById('user-menu-email').textContent = email;
  document.querySelectorAll('.mobile-email-el').forEach(el => el.textContent = email);

  // Hide admin-only UI for editors
  if (currentRole === 'editor') {
    document.querySelectorAll('.admin-only-tab').forEach(el => el.classList.add('hidden'));
    document.getElementById('team-btn')?.classList.add('hidden');
    document.getElementById('team-btn-mobile')?.classList.add('hidden');
  }

  // Show superadmin link
  if (isSuperAdmin) {
    document.getElementById('sa-link')?.classList.remove('hidden');
    document.getElementById('sa-link-mobile')?.classList.remove('hidden');
  }

  renderOrgSwitcher();
}

function toggleUserMenu() {
  const dd = document.getElementById('user-menu-dropdown');
  dd.classList.toggle('hidden');
  // Close on outside click
  setTimeout(() => {
    if (!dd.classList.contains('hidden')) {
      document.addEventListener('click', function closeMenu(e) {
        if (!e.target.closest('#user-menu-dropdown') && !e.target.closest('[onclick="toggleUserMenu()"]')) {
          dd.classList.add('hidden');
          document.removeEventListener('click', closeMenu);
        }
      });
    }
  }, 0);
}

function toggleMobileUserMenu() {
  document.getElementById('mobile-user-menu').classList.toggle('hidden');
}
function closeMobileMenu() {
  document.getElementById('mobile-user-menu').classList.add('hidden');
}

// ─── ORG SWITCHER ────────────────────────────────────────────
function renderOrgSwitcher() {
  const chevron = document.getElementById('org-chevron');
  const list    = document.getElementById('org-menu-list');
  if (!chevron || !list) return;
  if (allOrgs.length < 2) { chevron.classList.add('hidden'); return; }
  chevron.classList.remove('hidden');
  list.innerHTML = allOrgs.map(org => {
    const active = org.id === activeOrgId;
    return `<button onclick="switchOrg('${org.id}')"
      class="w-full text-left px-3 py-2.5 text-sm flex items-center gap-2.5 hover:bg-gray-50 transition-colors ${active ? 'text-amber-600' : 'text-gray-700'}">
      <span class="w-4 text-center text-xs shrink-0">${active ? '✓' : ''}</span>
      <span class="flex-1 truncate font-${active ? 'semibold' : 'normal'}">${org.name.replace(/</g,'&lt;')}</span>
      <span class="text-xs text-gray-400 shrink-0 capitalize">${org.role || ''}</span>
    </button>`;
  }).join('');
}

function toggleOrgMenu(e) {
  e.stopPropagation();
  if (allOrgs.length < 2) return;
  const menu    = document.getElementById('org-menu');
  const chevron = document.getElementById('org-chevron');
  const isOpen  = !menu.classList.contains('hidden');
  menu.classList.toggle('hidden');
  chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
}

async function switchOrg(orgId) {
  if (orgId === activeOrgId) { closeOrgMenu(); return; }
  closeOrgMenu();
  activeOrgId = orgId;
  localStorage.setItem(`activeOrg_${currentUser.id}`, orgId);

  // Re-fetch profile for the new org context
  const profile = await apiFetch('org-auth?action=profile').catch(() => null);
  if (profile && !profile.needsOrg) {
    currentOrg  = profile.org;
    currentRole = profile.role;
    allOrgs     = profile.allOrgs || allOrgs;
    document.querySelectorAll('.org-name-el').forEach(el => el.textContent = currentOrg?.name || '');
    applyRoleUI(profile.isSuperAdmin);
    renderOrgSwitcher();
  }

  // Reload data for the new org
  appData = { entries: [], drivers: [] };
  setSyncStatus('syncing');
  FS = blankFS();
  renderForm();
  const active = document.querySelector('.view:not(.hidden)');
  if (active?.id === 'view-daily')   renderDaily();
  if (active?.id === 'view-monthly') renderMonthly();
  try {
    const [entries, drivers] = await Promise.all([apiFetch('entries'), apiFetch('drivers')]);
    appData.entries = entries;
    if (drivers.length) appData.drivers = drivers;

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const Rs = n => 'Rs. ' + (n||0).toLocaleString('en-PK');
const N  = n => (n||0).toLocaleString('en-PK');

function calc(e) {
  const cashInc      = e.trips.reduce((s,t)=> t.pm==='cash' ? s+(+t.income||0) : t.pm==='partial' ? s+(+t.cashAmt||0) : s, 0);
  const totalInc     = e.trips.reduce((s,t)=>s+(+t.income||0),0);
  const tripExpCash  = e.trips.reduce((s,t)=>s+t.exp.reduce((ss,x)=>ss+((x.mode||'cash')==='cash'?(+x.amt||0):0),0),0);
  const tripExpCredit= e.trips.reduce((s,t)=>s+t.exp.reduce((ss,x)=>ss+(x.mode==='credit'?(+x.amt||0):0),0),0);
  const tripExp      = tripExpCash + tripExpCredit;
  const miscExp      = e.misc.reduce((s,x)=>s+(+x.amt||0),0);
  const coExp        = (e.coexp||[]).reduce((s,x)=>s+(+x.amt||0),0);
  const totalExp     = tripExp + miscExp + coExp;
  const drvIn        = (+e.prevCash||0) + (+e.advance||0) + cashInc;
  const drvRem       = drvIn - tripExpCash - miscExp;   // only cash expenses come out of driver's pocket
  const profit       = totalInc - totalExp;
  return { cashInc, totalInc, tripExpCash, tripExpCredit, tripExp, miscExp, coExp, totalExp, drvIn, drvRem, profit };
}

let FS = null;

function blankFS() {
  return { id:null, date:new Date().toISOString().slice(0,10), driver:'', prevCash:0, advance:0, trips:[], misc:[], coexp:[], clientPayments:[], vendorPayments:[], notes:'' };
}

function readDOM() {
  const g = id => document.getElementById(id);
  if (!g('f-date')) return;
  FS.date     = g('f-date').value;
  FS.driver   = g('f-driver').value;
  FS.prevCash = +g('f-prev').value||0;
  FS.advance  = +g('f-adv').value||0;
  FS.notes    = g('f-notes').value;
  FS.trips.forEach((t,ti)=>{
    t.dest   = (g(`t-dest-${ti}`)||{}).value||t.dest||'';
    t.cust   = (g(`t-cust-${ti}`)||{}).value||t.cust||'';
    t.income = +(g(`t-inc-${ti}`)||{}).value||0;
    const r  = document.querySelector(`input[name="t-pm-${ti}"]:checked`);
    if (r) t.pm = r.value;
    t.cashAmt = +(g(`t-cash-${ti}`)||{}).value||0;
    t.exp.forEach((x,ei)=>{
      x.desc   = (g(`t-ed-${ti}-${ei}`)||{}).value||x.desc||'';
      x.amt    = +(g(`t-ea-${ti}-${ei}`)||{}).value||0;
      x.mode   = (g(`t-em-${ti}-${ei}`)||{}).value||x.mode||'cash';
      x.vendor = (g(`t-ev-${ti}-${ei}`)||{}).value||x.vendor||'';
    });
  });
  FS.misc.forEach((x,i)=>{
    x.desc = (g(`m-d-${i}`)||{}).value||x.desc||'';
    x.amt  = +(g(`m-a-${i}`)||{}).value||0;
  });
  (FS.coexp||[]).forEach((x,i)=>{
    x.desc = (g(`c-d-${i}`)||{}).value||x.desc||'';
    x.qty  = +(g(`c-q-${i}`)||{}).value||0;
    x.rate = +(g(`c-r-${i}`)||{}).value||0;
    x.amt  = (x.qty&&x.rate) ? x.qty*x.rate : +(g(`c-a-${i}`)||{}).value||0;
  });
  (FS.clientPayments||[]).forEach((x,i)=>{
    x.client = (g(`cp-cl-${i}`)||{}).value||x.client||'';
    x.desc   = (g(`cp-ds-${i}`)||{}).value||x.desc||'';
    x.amount = +(g(`cp-am-${i}`)||{}).value||0;
    x.mode   = (g(`cp-mo-${i}`)||{}).value||x.mode||'cash';
  });
  (FS.vendorPayments||[]).forEach((x,i)=>{
    x.vendor = (g(`vp-vn-${i}`)||{}).value||x.vendor||'';
    x.amount = +(g(`vp-am-${i}`)||{}).value||0;
    x.mode   = (g(`vp-mo-${i}`)||{}).value||x.mode||'cash';
  });
}

  const drv  = (document.getElementById('f-driver')||{}).value?.trim();

  if (!drv || !date || FS.id) return;
  const prev = appData.entries
    .filter(e => e.driver?.trim() === drv && e.date < date)
    .sort((a,b) => b.date.localeCompare(a.date))[0];
  if (prev) {
    const safe = { trips:[], misc:[], coexp:[], ...prev };
    const rem  = calc(safe).drvRem;
    const el   = document.getElementById('f-prev');
    if (el) el.value = rem || 0;

    updateSummary();

}

function getLocations() {
  const s = new Set();
  appData.entries.forEach(e => e.trips.forEach(t => { if (t.dest?.trim()) s.add(t.dest.trim()); }));
  return [...s].sort();
}

function getVendors() {
  const s = new Set();
  appData.entries.forEach(e => {
    e.trips.forEach(t => (t.exp||[]).forEach(x => { if (x.vendor?.trim()) s.add(x.vendor.trim()); }));
    (e.vendorPayments||[]).forEach(p => { if (p.vendor?.trim()) s.add(p.vendor.trim()); });
  });
  return [...s].sort();
}

function clientBalance(entries) {
  const map = {};
  const ensure = client => { if (!map[client]) map[client] = { invoiced:0, cash:0, credit:0, payments:0 }; };
  entries.forEach(e => {
    e.trips.forEach(t => {
      const client = t.cust?.trim() || '(No Client)';
      ensure(client);
      const income = +t.income || 0;
      map[client].invoiced += income;
      if (t.pm === 'cash')         { map[client].cash   += income; }
      else if (t.pm === 'partial') { const cr = +t.cashAmt||0; map[client].cash += cr; map[client].credit += Math.max(0, income-cr); }
      else                         { map[client].credit += income; }
    });
    (e.clientPayments||[]).forEach(p => {
      const client = p.client?.trim() || '(No Client)';
      ensure(client);
      map[client].payments += +p.amount || 0;
    });
  });
  Object.values(map).forEach(d => {
    d.netOutstanding = Math.max(0, d.credit - d.payments);
    d.overpaid       = Math.max(0, d.payments - d.credit);
  });
  return map;
}

function vendorBalance(entries) {
  const map = {};
  const ensure = v => { if (!map[v]) map[v] = { owed:0, paid:0 }; };
  entries.forEach(e => {
    e.trips.forEach(t => {
      (t.exp||[]).forEach(x => {
        if (x.mode==='credit' && +x.amt>0) { const v=x.vendor?.trim()||'(Unknown Vendor)'; ensure(v); map[v].owed+=+x.amt; }
      });
    });
    (e.vendorPayments||[]).forEach(p => {
      if (+p.amount>0) { const v=p.vendor?.trim()||'(Unknown Vendor)'; ensure(v); map[v].paid+=+p.amount; }
    });
  });
  Object.values(map).forEach(d => { d.net = Math.max(0, d.owed - d.paid); });
  return map;
}

// ─── DAILY VIEW ─────────────────────────────────────────────
function renderDaily() {
  const data = load();
  const entries = [...data.entries].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('view-daily').innerHTML = `
    <div class="mb-4">
      <h1 class="text-xl font-bold text-slate-800">${t('view.daily_title')}</h1>
      <p class="text-gray-500 text-sm">${entries.length} ${t('daily.entries_count')}</p>
    </div>
    <input type="text" placeholder="${t('daily.search_ph')}" id="dsearch"
      class="w-full border rounded-xl px-4 py-3 text-sm mb-4 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300" oninput="filterDaily(this.value)">
    <div id="dlist" class="space-y-3">${buildDailyCards(entries)}</div>`;
}

function buildDailyCards(entries) {
  if (!entries.length) return `<div class="text-center py-16 text-gray-400 bg-white rounded-xl border">${t('daily.no_entries')}</div>`;
  return entries.map(e=>{
    const c  = calc(e);
    const d  = new Date(e.date+'T00:00:00');
    const ds = d.toLocaleDateString('en-PK',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
    return `
    <div class="bg-white rounded-xl border p-4 active:bg-blue-50 transition-colors" onclick="openDay('${e.id}')">
      <div class="flex justify-between items-start">
        <div>
          <div class="font-semibold text-slate-700">${ds}</div>
          <div class="text-sm text-gray-500 mt-0.5">${t('daily.driver')}: <strong>${esc(e.driver)}</strong> · ${e.trips.length} ${t('daily.trips')}</div>
        </div>
        <div class="text-right text-sm shrink-0 ml-3">
          <div class="text-green-600 font-bold">${Rs(c.totalInc)}</div>
          <div class="text-red-500">Exp: ${Rs(c.totalExp)}</div>
          <div class="font-bold ${c.profit>=0?'text-blue-700':'text-red-700'}">P: ${Rs(c.profit)}</div>
        </div>
      </div>
      <div class="mt-2 flex gap-1.5 flex-wrap">
        ${e.trips.map(tr=>`<span class="bg-blue-50 text-blue-700 text-xs px-2 py-0.5 rounded-full">${esc(tr.dest||'—')}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function filterDaily(q) {
  q = q.toLowerCase();
  const entries = load().entries.filter(e=>
    e.date.includes(q)||e.driver.toLowerCase().includes(q)||
    e.trips.some(t=>(t.dest||'').toLowerCase().includes(q))
  ).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('dlist').innerHTML = buildDailyCards(entries);
}

function openDay(id) {
  const e = load().entries.find(x=>x.id===id);
  if (!e) return;
  const c  = calc(e);
  const d  = new Date(e.date+'T00:00:00');
  const ds = d.toLocaleDateString('en-PK',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

  // Mobile-friendly trip cards instead of a wide table
  const tripCards = e.trips.map((t,i)=>{
    const te        = t.exp.reduce((s,x)=>s+(+x.amt||0),0);
    const cashExp   = t.exp.filter(x=>+x.amt>0&&(x.mode||'cash')==='cash').map(x=>`${esc(x.desc)}: ${N(x.amt)}`).join(' · ');
    const creditExp = t.exp.filter(x=>+x.amt>0&&x.mode==='credit').map(x=>`${esc(x.desc)}: ${N(x.amt)}${x.vendor?' ('+esc(x.vendor)+')':''}`).join(' · ');
    return `
    <div class="border rounded-lg p-3 mb-2">
      <div class="flex justify-between items-start mb-1">
        <div>
          <span class="text-xs text-gray-400 font-medium">${window.t('ledger.trip_label')} ${i+1}</span>
          <div class="font-semibold text-slate-700 text-sm">${esc(t.dest)}</div>
          ${t.cust ? `<div class="text-xs text-gray-500">${esc(t.cust)}</div>` : ''}
        </div>
        <span class="text-xs px-2 py-1 rounded-full shrink-0 ml-2 ${t.pm==='cash'?'bg-green-100 text-green-700':t.pm==='partial'?'bg-blue-100 text-blue-700':'bg-amber-100 text-amber-700'}">${t.pm==='cash'?window.t('pm.cash'):t.pm==='partial'?`${window.t('pm.partial')} (${window.t('ledger.cash')}: ${Rs(t.cashAmt||0)})`:`${window.t('pm.credit')}`}</span>
      </div>
      <div class="flex justify-between items-start mt-2 pt-2 border-t gap-2">
        <div class="flex-1 min-w-0">
          ${cashExp?`<div class="text-xs text-gray-400">${cashExp}</div>`:''}
          ${creditExp?`<div class="text-xs text-amber-600 mt-0.5">${window.t('pm.credit')}: ${creditExp}</div>`:''}
          ${!cashExp&&!creditExp?`<div class="text-xs text-gray-400">${window.t('modal.no_exp')}</div>`:''}
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm font-bold text-green-600">${Rs(t.income)}</div>
          <div class="text-xs text-red-500">Exp: ${Rs(te)}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const miscRows = e.misc.filter(x=>+x.amt>0).map(x=>`
    <div class="flex justify-between text-sm py-1">
      <span class="text-gray-600">${esc(x.desc)}</span>
      <span class="font-medium">${Rs(x.amt)}</span>
    </div>`).join('');

  const coRows = (e.coexp||[]).filter(x=>+x.amt>0).map(x=>`
    <div class="flex justify-between text-sm py-1">
      <span class="text-gray-600">${esc(x.desc)}${x.qty?` (${x.qty}${x.rate?' @ Rs.'+N(x.rate):''})`:''}</span>
      <span class="font-medium">${Rs(x.amt)}</span>
    </div>`).join('');

  const modeLabel = { cash:t('mode.cash'), bank:t('mode.bank'), expense:t('mode.expense') };
  const cpRows = (e.clientPayments||[]).filter(p=>+p.amount>0).map(p=>`
    <div class="flex justify-between text-sm py-1 items-start">
      <div>
        <span class="font-medium text-teal-700">${esc(p.client)}</span>
        <span class="text-gray-500"> — ${esc(p.desc)||'—'}</span>
        <span class="ml-1 text-xs bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded">${modeLabel[p.mode]||p.mode}</span>
      </div>
      <span class="font-semibold text-teal-700 shrink-0 ml-2">${Rs(p.amount)}</span>
    </div>`).join('');

  const vpRows = (e.vendorPayments||[]).filter(p=>+p.amount>0).map(p=>`
    <div class="flex justify-between text-sm py-1 items-center">
      <div>
        <span class="font-medium text-amber-700">${esc(p.vendor)}</span>

function openClientLedger(name) {
  const rows = [];
  appData.entries.forEach(e => {
    e.trips.forEach(t => {
      if ((t.cust?.trim()||'(No Client)') !== name) return;
      const inc = +t.income||0;
      let cash=0, credit=0;
      if      (t.pm==='cash')    { cash=inc; }
      else if (t.pm==='partial') { cash=+t.cashAmt||0; credit=Math.max(0,inc-cash); }
      else                       { credit=inc; }
      rows.push({ date:e.date, type:'trip', driver:e.driver, dest:t.dest||'—', inc, cash, credit, pm:t.pm });
    });
    (e.clientPayments||[]).forEach(p => {
      if ((p.client?.trim()||'(No Client)') !== name) return;
      rows.push({ date:e.date, type:'payment', desc:p.desc||'', amount:+p.amount||0, mode:p.mode });
    });
  });
  rows.sort((a,b)=>a.date.localeCompare(b.date));

  let bal=0;
  const processed = rows.map(r => {
    if (r.type==='trip') bal+=r.credit; else bal-=r.amount;
    return {...r, bal};
  });

  const totInv  = rows.filter(r=>r.type==='trip').reduce((s,r)=>s+r.inc,0);
  const totPaid = rows.filter(r=>r.type==='payment').reduce((s,r)=>s+r.amount,0);
  const totCredit = rows.filter(r=>r.type==='trip').reduce((s,r)=>s+r.credit,0);
  const outstanding = Math.max(0, totCredit-totPaid);

  const rowsHtml = processed.map(r => {
    const ds = new Date(r.date+'T00:00:00').toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'});

            ${r.pm==='cash'?t('ledger.cash')+': '+Rs(r.cash):r.pm==='partial'?t('ledger.partial_cash')+Rs(r.cash)+t('ledger.credit_lbl')+Rs(r.credit):t('ledger.full_credit')}
          </div>
        </div>
        <div class="text-right shrink-0">
          ${r.credit>0?`<div class="text-sm font-bold text-red-500">+${Rs(r.credit)}</div>`:`<div class="text-sm text-green-600">${Rs(r.cash)}</div>`}

        </div>
      </div>`;
    return `
      <div class="flex justify-between items-start py-3 border-b gap-2 bg-teal-50 px-2 rounded-lg my-1">
        <div>
          <div class="text-xs text-gray-400">${ds}</div>
          <div class="text-sm font-semibold text-teal-700">${t('ledger.payment_recv')}</div>
          ${r.desc?`<div class="text-xs text-gray-500">${esc(r.desc)}</div>`:''}
          <div class="text-xs text-gray-400">${r.mode==='bank'?t('ledger.bank'):r.mode==='expense'?t('ledger.expense_behalf'):t('ledger.cash')}</div>

          <button onclick="downloadClientLedger(decodeURIComponent('${safeN}'))"

function downloadClientLedger(name) {
  const rows = [['Date','Driver','Destination','Invoiced','Cash Received','Credit Amount','Payment Received','Description','Running Balance']];
  let bal=0;
  const txns = [];
  appData.entries.forEach(e => {
    e.trips.forEach(t => {
      if ((t.cust?.trim()||'(No Client)')!==name) return;
      const inc=+t.income||0; let cash=0,credit=0;
      if      (t.pm==='cash')    { cash=inc; }
      else if (t.pm==='partial') { cash=+t.cashAmt||0; credit=Math.max(0,inc-cash); }
      else                       { credit=inc; }
      txns.push({ date:e.date, type:'trip', driver:e.driver, dest:t.dest||'', inc, cash, credit });
    });
    (e.clientPayments||[]).forEach(p => {
      if ((p.client?.trim()||'(No Client)')!==name) return;
      txns.push({ date:e.date, type:'payment', desc:p.desc||'', amount:+p.amount||0 });
    });
  });
  txns.sort((a,b)=>a.date.localeCompare(b.date)).forEach(r => {
    if (r.type==='trip') { bal+=r.credit; rows.push([r.date,r.driver,r.dest,r.inc,r.cash,r.credit,'','',Math.max(0,bal)]); }
    else                 { bal-=r.amount; rows.push([r.date,'','','','','',r.amount,r.desc,Math.max(0,bal)]); }
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[12,14,20,14,14,14,16,22,16].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Ledger');
  XLSX.writeFile(wb,`${name}_ledger.xlsx`);
}

function editDay(id) {
  const e = load().entries.find(x=>x.id===id);
  if (!e) return;
  FS = JSON.parse(JSON.stringify(e));
  if (!FS.vendorPayments)  FS.vendorPayments  = [];
  if (!FS.clientPayments)  FS.clientPayments  = [];
  if (!FS.coexp)           FS.coexp           = [];
  closeModal();
  showView('entry');
}

async function delDay(id) {
  if (!confirm(t('confirm.delete'))) return;
  appData.entries = appData.entries.filter(e=>e.id!==id);
  cache();
  closeModal();
  renderDaily();
  setSyncStatus('syncing');
  try {
    await apiFetch('entries', { method:'DELETE', body:{ id } });
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); console.warn('Delete failed:', e); }
}

// ─── MONTHLY DASHBOARD ──────────────────────────────────────
let mCharts = {};

function shiftMonth(delta) {
  const pick = document.getElementById('mpick');
  if (!pick) return;
  const [y, m] = pick.value.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  pick.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  buildMonthly(pick.value);
}

function renderMonthly() {
  const now = new Date();
  const def = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('view-monthly').innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-xl font-bold text-slate-800">${t('monthly.title')}</h1>
      <div class="flex items-center gap-1">
        <button onclick="shiftMonth(-1)" class="w-9 h-9 flex items-center justify-center rounded-lg border bg-white hover:bg-gray-50 text-slate-600 shadow-sm text-lg font-bold">‹</button>
        <input type="month" id="mpick" value="${def}" class="border rounded-lg px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300" onchange="buildMonthly(this.value)">
        <button onclick="shiftMonth(1)" class="w-9 h-9 flex items-center justify-center rounded-lg border bg-white hover:bg-gray-50 text-slate-600 shadow-sm text-lg font-bold">›</button>
      </div>
    </div>
    <div id="mcontent"></div>`;
  buildMonthly(def);
}

function buildMonthly(month) {
  const data = load();
  const entries = data.entries.filter(e=>e.date.startsWith(month)).sort((a,b)=>a.date.localeCompare(b.date));
  Object.values(mCharts).forEach(c=>{try{c.destroy();}catch{}});
  mCharts = {};

  if (!entries.length) {
    document.getElementById('mcontent').innerHTML = `<div class="text-center py-16 text-gray-400 bg-white rounded-xl border">${t('monthly.no_entries')}</div>`;
    return;
  }

  const tot = entries.reduce((a,e)=>{
    const c=calc(e); a.inc+=c.totalInc; a.exp+=c.totalExp; a.prof+=c.profit; a.trips+=e.trips.length; return a;
  },{inc:0,exp:0,prof:0,trips:0});

  const dmap = {};
  entries.forEach(e=>{
    const c=calc(e);
    if (!dmap[e.driver]) dmap[e.driver]={inc:0,exp:0,prof:0,trips:0,days:0};
    dmap[e.driver].inc+=c.totalInc; dmap[e.driver].exp+=c.totalExp;
    dmap[e.driver].prof+=c.profit; dmap[e.driver].trips+=e.trips.length; dmap[e.driver].days++;
  });

  // Driver cards (mobile-friendly, no wide table)
  const driverCards = Object.entries(dmap).map(([drv,d])=>`
    <div class="border rounded-lg p-3">
      <div class="font-semibold text-slate-700 mb-2">${esc(drv)} <span class="text-xs text-gray-400 font-normal">${d.days} ${t('lbl.days')} · ${d.trips} ${t('lbl.trips')}</span></div>
      <div class="grid grid-cols-3 gap-2 text-center text-sm">
        <div><div class="text-xs text-gray-400">${t('lbl.income')}</div><div class="font-bold text-green-600">${Rs(d.inc)}</div></div>
        <div><div class="text-xs text-gray-400">${t('lbl.expenses')}</div><div class="font-bold text-red-500">${Rs(d.exp)}</div></div>
        <div><div class="text-xs text-gray-400">${t('lbl.profit')}</div><div class="font-bold ${d.prof>=0?'text-blue-700':'text-red-700'}">${Rs(d.prof)}</div></div>
      </div>
    </div>`).join('');

  // All-time carry-over: entries before this month
  const allEntries  = data.entries;
  const prevEntries = allEntries.filter(e => e.date < month + '-01');

  // ── Vendor payables with carry-over ──
  const prevVbal = vendorBalance(prevEntries);
  const currVbal = vendorBalance(entries);
  const allVendorNames = new Set([...Object.keys(prevVbal), ...Object.keys(currVbal)]);
  const totalVendorOwed = [...allVendorNames].reduce((s,v)=>{
    return s + (prevVbal[v]?.net||0) + (currVbal[v]?.net||0);
  }, 0);
  const vendorCards = [...allVendorNames]
    .sort((a,b)=>((prevVbal[b]?.net||0)+(currVbal[b]?.net||0))-((prevVbal[a]?.net||0)+(currVbal[a]?.net||0)))
    .map(v => {
      const prevNet  = prevVbal[v]?.net  || 0;
      const currOwed = currVbal[v]?.owed || 0;
      const currPaid = currVbal[v]?.paid || 0;
      const currNet  = currVbal[v]?.net  || 0;
      const total    = prevNet + currNet;
      return `
    <div class="border rounded-lg p-3">
      <div class="flex justify-between items-start mb-2">
        <button onclick="openVendorLedger(decodeURIComponent('${encodeURIComponent(v)}'))" class="text-sm font-semibold text-slate-700 hover:text-amber-600 hover:underline text-left cursor-pointer">${esc(v)}</button>
        <span class="text-sm font-bold ${total>0?'text-amber-700':'text-green-600'} shrink-0 ml-2">${total>0?Rs(total):t('lbl.cleared')}</span>
      </div>
      <div class="grid grid-cols-2 gap-1 text-center text-xs">
        <div class="bg-red-50 rounded p-1"><div class="text-gray-400">${t('lbl.credit_month')}</div><div class="font-semibold text-red-500">${Rs(currOwed)}</div></div>
        <div class="bg-green-50 rounded p-1"><div class="text-gray-400">${t('lbl.paid_month')}</div><div class="font-semibold text-green-600">${Rs(currPaid)}</div></div>
      </div>
      ${prevNet>0?`<div class="text-xs text-right mt-1.5 text-gray-400">${t('lbl.prev_balance')} <span class="font-semibold text-orange-500">${Rs(prevNet)}</span></div>`:''}
    </div>`;
    }).join('');

  // ── Client balance with carry-over ──
  const prevCmap = clientBalance(prevEntries);
  const currCmap = clientBalance(entries);
  const allClientNames = new Set([...Object.keys(prevCmap), ...Object.keys(currCmap)]);
  const totalCredit = [...allClientNames].reduce((s,c)=>{
    return s + (prevCmap[c]?.netOutstanding||0) + (currCmap[c]?.netOutstanding||0);
  }, 0);
  const clientCards = [...allClientNames]
    .sort((a,b)=>((prevCmap[b]?.netOutstanding||0)+(currCmap[b]?.netOutstanding||0))-((prevCmap[a]?.netOutstanding||0)+(currCmap[a]?.netOutstanding||0)))
    .map(client => {
      const prevOut  = prevCmap[client]?.netOutstanding || 0;
      const inv      = currCmap[client]?.invoiced   || 0;
      const cash     = currCmap[client]?.cash       || 0;
      const payments = currCmap[client]?.payments   || 0;
      const currNet  = currCmap[client]?.netOutstanding || 0;
      const total    = prevOut + currNet;
      return `
    <div class="border rounded-lg p-3">
      <div class="flex justify-between items-start mb-2">
        <button onclick="openClientLedger(decodeURIComponent('${encodeURIComponent(client)}'))" class="font-semibold text-slate-700 text-sm hover:text-amber-600 hover:underline text-left cursor-pointer">${esc(client)}</button>
        <span class="text-sm font-bold ${total>0?'text-red-600':'text-gray-400'} shrink-0 ml-2">${total>0?Rs(total):t('lbl.cleared')}</span>
      </div>
      <div class="grid grid-cols-3 gap-1 text-center text-xs">
        <div class="bg-gray-50 rounded p-1"><div class="text-gray-400">${t('lbl.invoiced')}</div><div class="font-semibold text-slate-600">${Rs(inv)}</div></div>
        <div class="bg-green-50 rounded p-1"><div class="text-gray-400">${t('lbl.cash_recv')}</div><div class="font-semibold text-green-600">${Rs(cash)}</div></div>
        <div class="bg-teal-50 rounded p-1"><div class="text-gray-400">${t('lbl.payments')}</div><div class="font-semibold text-teal-600">${Rs(payments)}</div></div>
      </div>
      ${prevOut>0?`<div class="text-xs text-right mt-1.5 text-gray-400">${t('lbl.prev_balance')} <span class="font-semibold text-orange-500">${Rs(prevOut)}</span></div>`:''}
    </div>`;
    }).join('');

  // Daily breakdown cards
  const dayCards = entries.map(e=>{
    const c=calc(e);
    const ds=new Date(e.date+'T00:00:00').toLocaleDateString('en-PK',{weekday:'short',day:'2-digit',month:'short'});
    return `
    <div class="flex justify-between items-center py-2.5 px-3 border-b last:border-b-0 active:bg-blue-50 cursor-pointer"
      onclick="showView('daily');setTimeout(()=>openDay('${e.id}'),80)">
      <div>
        <div class="text-sm font-medium text-slate-700">${ds}</div>
        <div class="text-xs text-gray-400">${esc(e.driver)} · ${e.trips.length} ${t('lbl.trips')}</div>
      </div>
      <div class="text-right text-sm">
        <div class="text-green-600 font-medium">${Rs(c.totalInc)}</div>
        <div class="font-bold ${c.profit>=0?'text-blue-700':'text-red-700'}">${Rs(c.profit)}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('mcontent').innerHTML = `
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-white rounded-xl border p-3 text-center shadow-sm">
        <div class="text-xs text-gray-500 uppercase tracking-wide font-medium">${t('monthly.total_income')}</div>
        <div class="text-xl font-bold text-green-600 mt-1">${Rs(tot.inc)}</div>
      </div>
      <div class="bg-white rounded-xl border p-3 text-center shadow-sm">
        <div class="text-xs text-gray-500 uppercase tracking-wide font-medium">${t('monthly.total_exp')}</div>
        <div class="text-xl font-bold text-red-500 mt-1">${Rs(tot.exp)}</div>
      </div>
      <div class="bg-white rounded-xl border p-3 text-center shadow-sm">
        <div class="text-xs text-gray-500 uppercase tracking-wide font-medium">${t('monthly.profit')}</div>
        <div class="text-xl font-bold ${tot.prof>=0?'text-blue-700':'text-red-600'} mt-1">${Rs(tot.prof)}</div>
      </div>
      <div class="bg-white rounded-xl border p-3 text-center shadow-sm">
        <div class="text-xs text-gray-500 uppercase tracking-wide font-medium">${t('monthly.trips')}</div>
        <div class="text-xl font-bold text-amber-600 mt-1">${tot.trips}</div>
        <div class="text-xs text-gray-400">${entries.length} ${t('monthly.days')}</div>
      </div>
    </div>

    <div class="grid sm:grid-cols-2 gap-4 mb-4">
      <div class="bg-white rounded-xl border p-4 shadow-sm">
        <h3 class="font-semibold text-slate-700 mb-3 text-sm">${t('monthly.inc_vs_exp')}</h3>
        <canvas id="ch-bar"></canvas>
      </div>
      <div class="bg-white rounded-xl border p-4 shadow-sm">
        <h3 class="font-semibold text-slate-700 mb-3 text-sm">${t('monthly.profit_trend')}</h3>
        <canvas id="ch-line"></canvas>
      </div>
    </div>

    <div class="bg-white rounded-xl border shadow-sm mb-4">
      <div class="p-3 border-b font-semibold text-slate-700">${t('monthly.driver_summary')}</div>
      <div class="p-3 space-y-2">${driverCards}</div>
    </div>

    <div class="bg-white rounded-xl border shadow-sm mb-4">
      <div class="p-3 border-b flex justify-between items-center">
        <span class="font-semibold text-slate-700">${t('monthly.client_balance')}</span>
        ${totalCredit>0?`<span class="text-xs font-semibold text-red-600 bg-red-50 px-2 py-1 rounded-full">${t('monthly.total_due')}: ${Rs(totalCredit)}</span>`:`<span class="text-xs text-green-600">${t('monthly.all_cleared')}</span>`}
      </div>
      <div class="p-3 space-y-2">${clientCards}</div>
    </div>

    ${allVendorNames.size>0 ? `
    <div class="bg-white rounded-xl border shadow-sm mb-4">
      <div class="p-3 border-b flex justify-between items-center">
        <span class="font-semibold text-slate-700">${t('monthly.vendor_payables')}</span>
        ${totalVendorOwed>0
          ? `<span class="text-xs font-semibold text-amber-700 bg-amber-50 px-2 py-1 rounded-full">${t('monthly.net_owed')}: ${Rs(totalVendorOwed)}</span>`
          : `<span class="text-xs text-green-600 font-semibold">${t('monthly.all_cleared2')}</span>`}
      </div>
      <div class="p-3 space-y-2">${vendorCards}</div>
    </div>` : ''}

    <div class="bg-white rounded-xl border shadow-sm">
      <div class="p-3 border-b flex justify-between items-center">
        <span class="font-semibold text-slate-700">${t('monthly.daily_breakdown')}</span>
        <span class="text-xs text-gray-400">${t('monthly.tap_detail')}</span>
      </div>
      ${dayCards}
      <div class="flex justify-between items-center py-2.5 px-3 bg-amber-50 font-semibold text-sm border-t-2">
        <span>${t('monthly.month_total')}</span>
        <div class="text-right">
          <div class="text-green-600">${Rs(tot.inc)}</div>
          <div class="${tot.prof>=0?'text-blue-700':'text-red-700'}">${Rs(tot.prof)}</div>
        </div>
      </div>
    </div>`;

  const labels = entries.map(e=>new Date(e.date+'T00:00:00').toLocaleDateString('en-PK',{day:'2-digit',month:'short'}));
  mCharts.bar = new Chart(document.getElementById('ch-bar'),{
    type:'bar', data:{ labels,
      datasets:[
        {label:'Income',   data:entries.map(e=>calc(e).totalInc), backgroundColor:'rgba(34,197,94,0.7)',  borderColor:'#16a34a', borderWidth:1},
        {label:'Expenses', data:entries.map(e=>calc(e).totalExp), backgroundColor:'rgba(239,68,68,0.7)', borderColor:'#dc2626', borderWidth:1}
      ]},
    options:{responsive:true, plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:11}}}}, scales:{y:{beginAtZero:true,ticks:{font:{size:10}}}}}
  });
  mCharts.line = new Chart(document.getElementById('ch-line'),{
    type:'line', data:{ labels,
      datasets:[{
        label:'Profit', data:entries.map(e=>calc(e).profit),
        backgroundColor:'rgba(59,130,246,0.1)', borderColor:'#3b82f6', borderWidth:2, fill:true, tension:0.3,
        pointBackgroundColor:entries.map(e=>calc(e).profit>=0?'#3b82f6':'#ef4444'), pointRadius:4
      }]},
    options:{responsive:true, plugins:{legend:{position:'top',labels:{boxWidth:12,font:{size:11}}}}, scales:{y:{beginAtZero:false,ticks:{font:{size:10}}}}}
  });
}

// ─── VIEW SWITCHING ─────────────────────────────────────────
function showView(name) {
  // Editors cannot access restricted views
  if (currentRole === 'editor' && (name === 'daily' || name === 'monthly')) name = 'entry';

  document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));
  document.getElementById('view-'+name).classList.remove('hidden');
  // Desktop nav — preserve hidden state for editor-restricted buttons
  document.querySelectorAll('.nav-btn').forEach(b=>{
    const wasHidden = b.classList.contains('hidden');
    const on = b.dataset.view===name;
    b.className = `nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors ${on?'bg-amber-500 text-slate-900':'text-slate-300 hover:bg-slate-700'}`;
    if (wasHidden) b.classList.add('hidden');
  });
  // Mobile bottom tabs — preserve hidden state too
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const wasHidden = b.classList.contains('hidden');
    const on = b.dataset.tab===name;
    b.className = `tab-btn flex-1 py-3 flex flex-col items-center gap-0.5 transition-colors ${on?'text-amber-400':'text-slate-400'}`;
    if (wasHidden) b.classList.add('hidden');
  });
  window.scrollTo(0,0);
  if (name==='entry')   renderForm();
  if (name==='daily')   renderDaily();
  if (name==='monthly') renderMonthly();
}

// ─── EXPORT TO EXCEL ────────────────────────────────────────
function exportData() {
  const wb = XLSX.utils.book_new();
  const entries = [...appData.entries].sort((a,b)=>a.date.localeCompare(b.date));

  // ── Sheet 1: Daily Summary ──
  const summaryRows = [
    ['Date', 'Driver', 'Trips', 'Total Income', 'Total Expenses', 'Trip Expenses', 'Misc Expenses', 'Company Expenses', 'Net Profit', 'Driver Prev Cash', 'Driver Remaining']
  ];
  entries.forEach(e => {
    const c = calc(e);
    summaryRows.push([
      e.date, e.driver, e.trips.length,
      c.totalInc, c.totalExp, c.tripExp, c.miscExp, c.coExp,
      c.profit, +e.prevCash||0, c.drvRem
    ]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
  ws1['!cols'] = [10,16,6,14,14,14,14,16,12,16,16].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws1, 'Daily Summary');

  // ── Sheet 2: Trip Detail ──
  const tripRows = [
    ['Date', 'Driver', 'Trip #', 'Destination', 'Customer', 'Total Income', 'Trip Expenses', 'Payment Mode', 'Cash Received', 'Credit (Due)']
  ];
  entries.forEach(e => {
    e.trips.forEach((t, i) => {
      const te  = t.exp.reduce((s,x)=>s+(+x.amt||0), 0);
      const inc = +t.income || 0;
      const cashRec   = t.pm==='cash' ? inc : t.pm==='partial' ? (+t.cashAmt||0) : 0;
      const creditDue = t.pm==='credit' ? inc : t.pm==='partial' ? Math.max(0, inc-(+t.cashAmt||0)) : 0;
      const pmLabel   = t.pm==='cash' ? 'Cash' : t.pm==='partial' ? 'Partial' : 'Credit';
      tripRows.push([e.date, e.driver, i+1, t.dest, t.cust||'', inc, te, pmLabel, cashRec, creditDue]);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(tripRows);
  ws2['!cols'] = [10,16,6,22,18,13,13,10,13,13].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Trip Detail');

  // ── Sheet 3: Expense Detail ──
  const expRows = [
    ['Date', 'Driver', 'Category', 'Description', 'Qty', 'Rate', 'Amount']
  ];
  entries.forEach(e => {
    e.trips.forEach((t, i) => {
      t.exp.forEach(x => {
        if (+x.amt) expRows.push([e.date, e.driver, `Trip ${i+1} Expense`, x.desc, '', '', +x.amt]);
      });
    });
    e.misc.forEach(x => {
      if (+x.amt) expRows.push([e.date, e.driver, 'Misc', x.desc, '', '', +x.amt]);
    });
    (e.coexp||[]).forEach(x => {
      if (+x.amt) expRows.push([e.date, e.driver, 'Company', x.desc, x.qty||'', x.rate||'', +x.amt]);
    });
  });
  const ws3 = XLSX.utils.aoa_to_sheet(expRows);
  ws3['!cols'] = [10,16,14,22,6,8,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws3, 'Expense Detail');

  // ── Sheet 4: Client Balance ──
  const cb = clientBalance(entries);
  const clientRows = [
    ['Client / Party', 'Total Invoiced', 'Trip Cash Received', 'Trip Credit', 'Standalone Payments', 'Net Outstanding']
  ];
  Object.entries(cb)
    .sort((a,b) => b[1].netOutstanding - a[1].netOutstanding)
    .forEach(([client, d]) => clientRows.push([client, d.invoiced, d.cash, d.credit, d.payments, d.netOutstanding]));
  const cbTot = Object.values(cb).reduce((a,d)=>({ invoiced:a.invoiced+d.invoiced, cash:a.cash+d.cash, credit:a.credit+d.credit, payments:a.payments+d.payments, netOutstanding:a.netOutstanding+d.netOutstanding }), {invoiced:0,cash:0,credit:0,payments:0,netOutstanding:0});
  clientRows.push(['', '', '', '', '', '']);
  clientRows.push(['TOTAL', cbTot.invoiced, cbTot.cash, cbTot.credit, cbTot.payments, cbTot.netOutstanding]);
  const ws4 = XLSX.utils.aoa_to_sheet(clientRows);
  ws4['!cols'] = [24,16,18,14,20,18].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws4, 'Client Balance');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `AlAwal-Ledger-${date}.xlsx`);
}

function t(key) {
  return (TRANSLATIONS[currentLang]||TRANSLATIONS.en)[key] || TRANSLATIONS.en[key] || key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

function initLang() {
  const email = currentUser?.email || 'default';
  const saved = (localStorage.getItem(`lang_${email}`) || 'en');
  currentLang = saved;
  document.body.classList.toggle('lang-ur', saved === 'ur');
  document.documentElement.dir = saved === 'ur' ? 'rtl' : 'ltr';
  applyI18n();
}

function setLang(lang) {
  currentLang = lang;
  const email = currentUser?.email || 'default';
  try { localStorage.setItem(`lang_${email}`, lang); } catch {}
  document.body.classList.toggle('lang-ur', lang === 'ur');
  document.documentElement.dir = lang === 'ur' ? 'rtl' : 'ltr';
  applyI18n();
  const active = document.querySelector('.view:not(.hidden)');
  if (active?.id === 'view-entry')   renderForm();
  if (active?.id === 'view-daily')   renderDaily();
  if (active?.id === 'view-monthly') renderMonthly();
}

function toggleLang() { setLang(currentLang === 'en' ? 'ur' : 'en'); }

// ─── ESCAPE ─────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── INIT ───────────────────────────────────────────────────
FS = blankFS();
document.addEventListener('keydown', e => {
  if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && e.target.type === 'number') e.preventDefault();
}, true);

renderForm();
showView('entry');
initData();

// Close org menu on outside click
document.addEventListener('click', (e) => {
  if (!document.getElementById('org-switcher-wrap')?.contains(e.target)) {
    closeOrgMenu();
  }
});
</script>
